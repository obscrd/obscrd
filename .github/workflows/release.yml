name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.2.0'
      # Install with workspace deps intact
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run test

      # NOW resolve versions and clean up for publish
      - name: Prepare packages for publish
        run: |
          VERSION=${{ inputs.version }}

          # Set versions
          for f in packages/core/package.json packages/react/package.json packages/robots/package.json packages/cli/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
              pkg.version = '${VERSION}';
              if (pkg.devDependencies?.['@obscrd/typescript-config']) {
                delete pkg.devDependencies['@obscrd/typescript-config'];
              }
              if (pkg.dependencies?.['@obscrd/core'] === 'workspace:*') {
                pkg.dependencies['@obscrd/core'] = '^${VERSION}';
              }
              fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

      # Publish in dependency order
      - name: Publish @obscrd/core
        run: cd packages/core && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @obscrd/react
        run: cd packages/react && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @obscrd/robots
        run: cd packages/robots && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish obscrd
        run: cd packages/cli && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag and commit — only persist version bumps, not publish mutations
      - name: Commit and tag
        run: |
          # Restore workspace refs that were modified for publish
          git checkout -- packages/*/package.json

          # Only bump the version field in each package.json
          VERSION=${{ inputs.version }}
          for f in packages/core/package.json packages/react/package.json packages/robots/package.json packages/cli/package.json; do
            node -e "
              const fs = require('fs');
              const pkg = JSON.parse(fs.readFileSync('$f', 'utf8'));
              pkg.version = '${VERSION}';
              fs.writeFileSync('$f', JSON.stringify(pkg, null, 2) + '\n');
            "
          done

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add -A
          git commit -m "chore: release v${{ inputs.version }}"
          git tag "v${{ inputs.version }}"
          git push && git push --tags
